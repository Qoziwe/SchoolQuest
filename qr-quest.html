<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>QR — Квест «Цифровой Детектив»</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Unbounded:wght@400;700;900&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #070710;
      --surface: rgba(15, 15, 26, .85);
      --surface2: rgba(22, 22, 37, .85);
      --border: #252538;
      --accent: #06b6d4;
      --accent2: #7c3aed;
      --accent3: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e8e8f8;
      --muted: #5a5a7a;
      --mono: "Space Mono", monospace;
      --display: "Unbounded", sans-serif
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .03) 2px, rgba(0, 0, 0, .03) 4px);
      pointer-events: none;
      z-index: 100
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(6, 182, 212, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(6, 182, 212, .04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0
    }

    .bg-blobs,
    .bg-terminal {
      pointer-events: none !important;
      user-select: none;
      -webkit-user-select: none
    }

    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden
    }

    .blob {
      position: absolute;
      filter: blur(100px);
      border-radius: 50%;
      opacity: .15;
      animation: float 12s infinite alternate ease-in-out
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: 20%;
      left: -150px
    }

    .blob-2 {
      width: 600px;
      height: 600px;
      background: var(--accent2);
      bottom: -10%;
      right: -200px;
      animation-delay: -4s
    }

    .blob-3 {
      width: 400px;
      height: 400px;
      background: var(--accent3);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -7s;
      opacity: .1
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(40px, -40px) scale(1.1)
      }
    }

    .bg-terminal {
      position: fixed;
      inset: 0;
      z-index: -1;
      color: rgba(6, 182, 212, .25);
      text-shadow: 0 0 5px rgba(6, 182, 212, .3);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.5;
      -webkit-mask-image: linear-gradient(to bottom, transparent 2%, black 10%, black 90%, transparent 98%);
      mask-image: linear-gradient(to bottom, transparent 2%, black 10%, black 90%, transparent 98%)
    }

    .term-col {
      position: absolute;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      pointer-events: none !important
    }

    .term-left {
      left: 0;
      width: 50vw;
      max-width: calc(50vw - 300px);
      white-space: nowrap;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, black 70%, transparent 100%);
      mask-image: linear-gradient(to right, black 70%, transparent 100%)
    }

    .term-right {
      right: 0;
      width: 300px;
      max-width: 25vw;
      text-align: right
    }

    .term-line {
      opacity: 0;
      animation: typeFadeIn .2s forwards
    }

    @keyframes typeFadeIn {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media(max-width:1000px) {
      .term-left {
        max-width: 25vw
      }
    }

    .container {
      position: relative;
      z-index: 99;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn .5s ease
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 5px 14px;
      margin-bottom: 1.25rem;
      animation: blink 2s ease infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    .header {
      text-align: center;
      margin-bottom: 2rem
    }

    .header h1 {
      font-family: var(--display);
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900;
      letter-spacing: -.02em;
      line-height: 1.15;
      text-align: center
    }

    .dim {
      color: var(--muted)
    }

    .hi {
      color: var(--accent)
    }

    .header p {
      margin-top: .75rem;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      text-align: center
    }

    .qr-card {
      background: var(--surface);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 2rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden
    }

    .qr-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
      background-size: 200% 100%;
      animation: gradSlide 3s ease infinite
    }

    @keyframes gradSlide {
      0% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }

      100% {
        background-position: 0% 50%
      }
    }

    .qr-label {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem
    }

    .qr-wrapper {
      background: #fff;
      padding: 16px;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(6, 182, 212, .15), 0 0 60px rgba(6, 182, 212, .05);
      transition: box-shadow .3s ease
    }

    .qr-wrapper:hover {
      box-shadow: 0 0 40px rgba(6, 182, 212, .25), 0 0 80px rgba(6, 182, 212, .1)
    }

    #qrcode {
      display: flex;
      align-items: center;
      justify-content: center
    }

    #qrcode canvas {
      display: none !important
    }

    #qrcode img {
      display: block !important
    }

    .qr-url {
      margin-top: 1.5rem;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .05em;
      word-break: break-all;
      text-align: center;
      line-height: 1.6
    }

    .qr-url span {
      color: var(--accent);
      font-weight: 700
    }

    .scan-hint {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(6, 182, 212, .04);
      border: 1px solid rgba(6, 182, 212, .15);
      padding: 10px 16px;
      width: 100%
    }

    .scan-hint .icon {
      font-size: 20px;
      flex-shrink: 0
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 11px;
      color: var(--border);
      letter-spacing: .1em
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media print {
      body {
        background: #fff !important;
        color: #000 !important
      }

      body::before,
      body::after,
      .bg-blobs,
      .bg-terminal {
        display: none !important
      }

      .qr-card {
        background: #fff !important;
        border: 2px solid #000 !important;
        -webkit-backdrop-filter: none !important;
        backdrop-filter: none !important
      }

      .qr-card::before {
        display: none !important
      }

      .badge {
        color: #000 !important;
        border-color: #000 !important
      }

      .header h1,
      .header h1 .dim,
      .header h1 .hi,
      .qr-label,
      .qr-url,
      .qr-url span,
      .scan-hint,
      .footer {
        color: #000 !important
      }

      .scan-hint {
        background: #f0f0f0 !important;
        border-color: #ccc !important
      }

      .qr-wrapper {
        box-shadow: none !important
      }
    }
  </style>
</head>

<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="bg-terminal" id="bg-terminal">
    <div class="term-col term-left" id="term-left"></div>
    <div class="term-col term-right" id="term-right"></div>
  </div>

  <div class="container">
    <div class="header">
      <div class="badge">// квест · декада информатики</div>
      <h1><span class="dim">СКАНИРУЙ</span><br /><span class="hi">КВЕСТ</span></h1>
      <p>Наведи камеру телефона на QR-код и начни расследование</p>
    </div>
    <div class="qr-card">
      <div class="qr-label">// qr-код квеста</div>
      <div class="qr-wrapper">
        <div id="qrcode"></div>
      </div>
      <div class="qr-url">→ <span>https://qoziwe.github.io/SchoolQuest/quest.html</span></div>
      <div class="scan-hint"><span class="icon">📱</span>Наведи камеру телефона на QR-код — откроется страница квеста
        «Цифровой Детектив»</div>
    </div>
    <div class="footer">ШКОЛЬНАЯ ДЕКАДА ИНФОРМАТИКИ · 2026</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById("qrcode"), { text: "https://qoziwe.github.io/SchoolQuest/quest.html", width: 220, height: 220, colorDark: "#070710", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });

    const termPhrases = ["SYSTEM BOOT SEQUENCE INITIATED...", "LOADING KERNEL MODULES... OK", "MOUNTING VIRTUAL FILESYSTEMS... DONE", "INITIALIZING NETWORK INTERFACES...[eth0: UP]", "ESTABLISHING SECURE CONNECTION...", "HANDSHAKE PROTOCOL: ACCEPTED", "DECRYPTING DATA STREAM...", "ALLOCATING MEMORY POOLS: 0x8F4A2B00", "CHECKING FIREWALL RULES... PASS", "PORT SCAN DETECTED. MITIGATING...", "LOADING DEPENDENCIES... 100%", "EXECUTING MAIN LOOP...", "QR_SCANNER: READY", "AWAITING SCAN INPUT...", "CPU USAGE: 14% | RAM: 1.2GB/16GB", "root@system:~# _"];
    function addTerminalLine(colId, skipAnim) {
      const col = document.getElementById(colId), line = document.createElement("div");
      line.className = "term-line";
      if (skipAnim) { line.style.animation = "none"; line.style.opacity = "1" }
      let text = "";
      if (colId === "term-right") { const d = new Date(); text = d.toLocaleTimeString() + "." + String(d.getMilliseconds()).padStart(3, "0") }
      else text = termPhrases[Math.floor(Math.random() * termPhrases.length)];
      line.textContent = text; col.appendChild(line);
      while (col.children.length > 80) col.removeChild(col.firstChild);
    }
    for (let i = 0; i < 30; i++) { addTerminalLine("term-left", true); addTerminalLine("term-right", true) }
    setInterval(() => addTerminalLine("term-left"), 1200);
    setInterval(() => addTerminalLine("term-right"), 600);
  </script>
</body>

</html>
